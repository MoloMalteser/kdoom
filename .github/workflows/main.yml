name: Kindle-Doom-Build-With-KOX

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make autoconf automake libtool wget tar git

      - name: Download Pre-built KOX Toolchain
        run: |
          # Wir laden eine fertige ARM-Kindle-Toolchain (hf = hardfloat für neuere Kindles)
          # Link-Beispiel (angepasst auf ein gängiges Release):
          wget https://github.com/koreader/koxtoolchain/releases/download/2024.11/x86_64-pc-linux-gnu-arm-kindlehf-linux-gnueabihf.tar.xz
          tar -xJf x86_64-pc-linux-gnu-arm-kindlehf-linux-gnueabihf.tar.xz
          # Wir verschieben sie an einen festen Ort
          sudo mv arm-kindlehf-linux-gnueabihf /opt/koxtoolchain
          # Pfad zum Environment hinzufügen
          echo "/opt/koxtoolchain/bin" >> $GITHUB_PATH

      - name: Build Doom
        run: |
          # Jetzt existiert 'arm-kindlehf-linux-gnueabihf-gcc' wirklich im System!
          # Wir müssen nur noch die Variablen an das Makefile übergeben.
          make ARMHF=1 KIN=1 \
            CROSS_COMPILE=arm-kindlehf-linux-gnueabihf- \
            CROSS_TC=arm-kindlehf-linux-gnueabihf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kdoom-pro-bin
          path: |
            kdoom
            fbdoom
