name: Kindle-Doom-Build-Final-Fix

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make autoconf automake libtool wget tar git

      - name: Download and Setup KOX Toolchain
        run: |
          wget https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlehf.tar.gz
          sudo mkdir -p /opt/x-tools
          sudo tar -xzf kindlehf.tar.gz -C /opt/x-tools
          echo "$(find /opt/x-tools -type d -name "bin" | head -n 1)" >> $GITHUB_PATH

      - name: Fix Source Code Errors
        run: |
          # 1. Fix für den sprintf-Fehler von vorhin
          sed -i 's/sprintf(stderr/fprintf(stderr/g' src/i_input_evdev.c || true
          sed -i 's/sprintf(stderr/fprintf(stderr/g' src/i_input_raw.c || true
          
          # 2. Fix für 'I_EndRead' Fehler in w_wad.c
          # Wir fügen eine leere Dummy-Funktion hinzu, damit der Linker nicht meckert
          echo "void I_EndRead(void) { }" >> src/i_system.c
          # Und wir deklarieren sie im Header, damit der Compiler sie kennt
          sed -i '1i void I_EndRead(void);' src/w_wad.c
          
          # 3. Fehlendes time.h hinzufügen
          sed -i '1i #include <time.h>' src/d_main.c

      - name: Build Doom
        run: |
          # Wir fügen -Wno-error hinzu, um sicherzustellen, dass Warnungen den Build nicht stoppen
          make ARMHF=1 KIN=1 \
            CROSS_COMPILE=arm-kindlehf-linux-gnueabihf- \
            CROSS_TC=arm-kindlehf-linux-gnueabihf \
            CC="arm-kindlehf-linux-gnueabihf-gcc -Wno-implicit-function-declaration" \
            AR=arm-kindlehf-linux-gnueabihf-ar \
            STRIP=arm-kindlehf-linux-gnueabihf-strip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: doom-kindle-working
          path: |
            kdoom
            fbdoom
