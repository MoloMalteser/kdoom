name: Kindle-Doom-Build-ARMHF

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARMHF Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf make autoconf automake libtool
          # Hier biegen wir die Namen für FBInk gerade:
          sudo ln -sf /usr/bin/arm-linux-gnueabihf-gcc /usr/bin/arm-kindlehf-linux-gnueabihf-gcc
          sudo ln -sf /usr/bin/arm-linux-gnueabihf-ar /usr/bin/arm-kindlehf-linux-gnueabihf-ar
          sudo ln -sf /usr/bin/arm-linux-gnueabihf-ld /usr/bin/arm-linux-gnueabihf-ld

      - name: Build Doom
        run: |
          # Wir erzwingen ARMHF und Kindle-Modus
          make ARMHF=1 KIN=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kdoom-bin-armhf
          path: |
            kdoom
            fbdoom
