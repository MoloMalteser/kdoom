name: Kindle-Doom-Build-Echte-Toolchain

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make autoconf automake libtool wget tar git

      - name: Download and Setup KOX Toolchain
        run: |
          # Toolchain herunterladen
          wget https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlehf.tar.gz
          
          # Erstellen eines Zielverzeichnisses
          sudo mkdir -p /opt/x-tools
          
          # Entpacken (wir gehen davon aus, dass der Ordner 'arm-kindlehf-linux-gnueabihf' enthalten ist)
          sudo tar -xzf kindlehf.tar.gz -C /opt/x-tools
          
          # Den Pfad zu den Binaries finden und zum GITHUB_PATH hinzufügen
          # Wir suchen nach dem 'bin' Verzeichnis unter /opt/x-tools
          echo "$(find /opt/x-tools -type d -name "bin" | head -n 1)" >> $GITHUB_PATH

      - name: Build Doom
        run: |
          # Da die Toolchain jetzt im PATH ist, wird 'arm-kindlehf-linux-gnueabihf-gcc' gefunden.
          # Wir übergeben die Namen explizit, damit FBInk nicht versucht, etwas anderes zu suchen.
          make ARMHF=1 KIN=1 \
            CROSS_COMPILE=arm-kindlehf-linux-gnueabihf- \
            CROSS_TC=arm-kindlehf-linux-gnueabihf \
            CC=arm-kindlehf-linux-gnueabihf-gcc \
            AR=arm-kindlehf-linux-gnueabihf-ar \
            STRIP=arm-kindlehf-linux-gnueabihf-strip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: doom-kindle-pro
          path: |
            kdoom
            fbdoom
