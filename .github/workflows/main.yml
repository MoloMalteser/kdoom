      - name: Install and Rename Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
          # Der Trick: Wir erstellen Aliase für die Namen, die FBInk erwartet
          sudo ln -s /usr/bin/arm-linux-gnueabihf-gcc /usr/bin/arm-kindlehf-linux-gnueabihf-gcc
          sudo ln -s /usr/bin/arm-linux-gnueabihf-ar /usr/bin/arm-kindlehf-linux-gnueabihf-ar
          sudo ln -s /usr/bin/arm-linux-gnueabihf-ld /usr/bin/arm-kindlehf-linux-gnueabihf-ld

      - name: Compile
        run: |
          # Jetzt findet FBInk seinen "arm-kindlehf..." Compiler!
          make ARMHF=1 KIN=1
