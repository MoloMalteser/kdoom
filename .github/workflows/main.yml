name: Kindle-Doom-Build-Fixed

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make autoconf automake libtool wget tar git

      - name: Download and Setup KOX Toolchain
        run: |
          wget https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlehf.tar.gz
          sudo mkdir -p /opt/x-tools
          sudo tar -xzf kindlehf.tar.gz -C /opt/x-tools
          echo "$(find /opt/x-tools -type d -name "bin" | head -n 1)" >> $GITHUB_PATH

      - name: Fix Source Code Errors
        run: |
          # Ersetzt das falsche 'sprintf(stderr' durch das richtige 'fprintf(stderr'
          sed -i 's/sprintf(stderr/fprintf(stderr/g' src/i_input_evdev.c
          # Optional: Fix für Zeit-Warning in d_main.c (falls du sie sauber haben willst)
          sed -i '1i #include <time.h>' src/d_main.c

      - name: Build Doom
        run: |
          make ARMHF=1 KIN=1 \
            CROSS_COMPILE=arm-kindlehf-linux-gnueabihf- \
            CROSS_TC=arm-kindlehf-linux-gnueabihf \
            CC=arm-kindlehf-linux-gnueabihf-gcc \
            AR=arm-kindlehf-linux-gnueabihf-ar \
            STRIP=arm-kindlehf-linux-gnueabihf-strip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: doom-kindle-final
          path: |
            kdoom
            fbdoom
