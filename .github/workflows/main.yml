name: Kindle-Doom-Build-Fixed

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make autoconf automake libtool wget tar git python3

      - name: Download and Setup KOX Toolchain
        run: |
          # Lädt die spezialisierte Kindle-Toolchain (ARMHF)
          wget https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlehf.tar.gz
          sudo mkdir -p /opt/x-tools
          sudo tar -xzf kindlehf.tar.gz -C /opt/x-tools
          # Pfad für die Binaries setzen
          echo "/opt/x-tools/x-tools/arm-kindlehf-linux-gnueabihf/bin" >> $GITHUB_PATH

      - name: Patch Source Code
        run: |
          # 1. Fix: sprintf(stderr, ...) zu fprintf(stderr, ...) konvertieren
          # Dies behebt den Fehler in i_input_evdev.c / i_input_raw.c
          find src/ -name "i_input*.c" -exec sed -i 's/sprintf(stderr/fprintf(stderr/g' {} +
          
          # 2. Fix: Deklaration von I_EndRead in w_wad.c hinzufügen
          # Verhindert "implicit declaration" Fehler, ohne "multiple definition" zu erzeugen
          sed -i '1i void I_EndRead(void);' src/w_wad.c
          
          # 3. Fix: Fehlendes time.h für Zeitfunktionen hinzufügen
          sed -i '1i #include <time.h>' src/d_main.c
          
          # 4. Optional: Warnungen unterdrücken, die den Build stoppen könnten
          # Ersetzt -Werror (falls vorhanden) durch normales Warning-Level

      - name: Build Doom for Kindle
        run: |
          # Wir übergeben die Cross-Compiler Variablen direkt an Make
          # CFLAGS wird erweitert, um implizite Deklarationen zu erlauben (Sicherheitsnetz)
          make ARMHF=1 KIN=1 \
            CROSS_COMPILE=arm-kindlehf-linux-gnueabihf- \
            CC="arm-kindlehf-linux-gnueabihf-gcc -Wno-implicit-function-declaration" \
            AR=arm-kindlehf-linux-gnueabihf-ar \
            STRIP=arm-kindlehf-linux-gnueabihf-strip \
            RANLIB=arm-kindlehf-linux-gnueabihf-ranlib

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          # Falls das Binary 'kdoom' oder 'fbdoom' heißt, kopieren wir es
          [ -f kdoom ] && cp kdoom output/
          [ -f fbdoom ] && cp fbdoom output/
          # Kopiere auch die Readme oder Configs, falls vorhanden
          cp README.md output/ || true

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: kdoom-kindle-binaries
          path: output/
